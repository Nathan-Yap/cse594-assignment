<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Complete — Feedback</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1c2030;
    --border: #252a35;
    --accent: #e8f04a;
    --accent2: #4af0c8;
    --text: #e8eaf0;
    --muted: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .grid-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(74,240,200,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,240,200,.03) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  .container {
    position: relative; z-index: 1;
    max-width: 620px; width: 90%;
    padding: 2rem 0;
  }

  /* ── Summary card ── */
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .summary-card h2 {
    font-size: .75rem; letter-spacing: .1em;
    color: var(--accent2); font-family: 'DM Mono', monospace;
    text-transform: uppercase; margin-bottom: 1rem;
  }
  .stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;
  }
  .stat {
    text-align: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem .5rem;
  }
  .stat-value { font-size: 1.8rem; font-weight: 800; color: var(--accent); }
  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: .65rem; color: var(--muted);
    letter-spacing: .08em; margin-top: .25rem;
  }

  /* ── Form card ── */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .form-card h2 {
    font-size: .75rem; letter-spacing: .1em;
    color: var(--accent); font-family: 'DM Mono', monospace;
    text-transform: uppercase; margin-bottom: 1.5rem;
  }
  .field { margin-bottom: 1.5rem; }
  .field:last-of-type { margin-bottom: 0; }
  .field label {
    display: block;
    font-size: .9rem; font-weight: 600;
    margin-bottom: .35rem;
  }
  .field .hint {
    font-size: .78rem; color: var(--muted); margin-bottom: .75rem;
    line-height: 1.5;
  }

  /* ── Likert scale ── */
  .likert-wrap {
    display: flex;
    flex-direction: column;
    gap: .5rem;
  }
  .likert-anchors {
    display: flex;
    justify-content: space-between;
    font-size: .7rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    padding: 0 2px;
  }
  .likert-scale {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: .35rem;
  }
  .likert-opt {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .3rem;
    cursor: pointer;
    user-select: none;
  }
  .likert-btn {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: .85rem;
    color: var(--muted);
    transition: border-color .15s, background .15s, color .15s;
  }
  .likert-opt:hover .likert-btn {
    border-color: rgba(232,240,74,.4);
    color: var(--text);
  }
  .likert-opt.selected .likert-btn {
    border-color: var(--accent);
    background: rgba(232,240,74,.1);
    color: var(--accent);
    font-weight: 700;
  }

  /* ── Submit ── */
  .btn {
    display: block; width: 100%;
    background: var(--accent);
    color: #0d0f14; border: none;
    padding: .9rem 1.5rem;
    font-family: 'Syne', sans-serif;
    font-size: 1rem; font-weight: 700;
    border-radius: 6px; cursor: pointer;
    transition: opacity .15s;
    margin-top: 1.5rem;
  }
  .btn:disabled { opacity: .35; cursor: not-allowed; }
  .btn:not(:disabled):hover { opacity: .9; }

  /* ── Done state ── */
  #done-state { display: none; text-align: center; padding: 2rem 0; }
  #done-state h1 { font-size: 2rem; font-weight: 800; margin-bottom: .5rem; }
  #done-state h1 span { color: var(--accent2); }
  #done-state p { color: var(--muted); margin-bottom: 1.5rem; }
  .code-final {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    color: var(--accent);
    letter-spacing: .06em;
    word-break: break-all;
    margin-bottom: .75rem;
  }
  .copy-btn {
    background: rgba(232,240,74,.1);
    border: 1px solid rgba(232,240,74,.3);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: .75rem;
    padding: .4rem 1rem; border-radius: 4px;
    cursor: pointer; transition: background .15s;
  }
  .copy-btn:hover { background: rgba(232,240,74,.2); }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="container">

  <!-- Summary -->
  <!-- <div class="summary-card">
    <h2>Your Results</h2>
    <div class="stats-row">
      <div class="stat"><div class="stat-value" id="stat-accuracy">—</div><div class="stat-label">Accuracy</div></div>
      <div class="stat"><div class="stat-value" id="stat-correct">—</div><div class="stat-label">Correct</div></div>
      <div class="stat"><div class="stat-value" id="stat-avg-time">—</div><div class="stat-label">Avg. Time</div></div>
    </div>
  </div> -->

  <!-- Feedback form -->
  <div class="form-card" id="feedback-form">
    <h2>Post-Study Feedback</h2>

    <!-- Q1: Confidence (Likert 1-7) -->
    <div class="field">
      <label>How confident are you in the classifications you gave for this task?</label>
      <p class="hint">1 = Not at all confident &nbsp;·&nbsp; 7 = Extremely confident</p>
      <div class="likert-wrap">
        <div class="likert-anchors">
          <span>Not at all confident</span>
          <span>Extremely confident</span>
        </div>
        <div class="likert-scale" id="confidence-group">
          <!-- generated by JS -->
        </div>
      </div>
    </div>

    <!-- Q2: Mental effort (Likert 1-7) -->
    <div class="field">
      <label>How much mental effort did you put into identifying the vehicles?</label>
      <p class="hint">1 = Very low effort &nbsp;·&nbsp; 7 = Very high effort</p>
      <div class="likert-wrap">
        <div class="likert-anchors">
          <span>Very low effort</span>
          <span>Very high effort</span>
        </div>
        <div class="likert-scale" id="effort-group">
          <!-- generated by JS -->
        </div>
      </div>
    </div>

    <button class="btn" id="submit-fb-btn" onclick="submitFeedback()">
      Submit Feedback &amp; Get Final Code
    </button>
  </div>

  <!-- Done state -->
  <div id="done-state">
    <h1>All <span>Done!</span></h1>
    <p>Please enter this code in the MTurk HIT to complete your submission.</p>
    <div class="code-final" id="final-code-display">—</div>
    <button class="copy-btn" onclick="copyFinal()">Copy code</button>
  </div>
</div>

<script>
const params     = new URLSearchParams(location.search);
const SESSION_ID = params.get('code') || sessionStorage.getItem('survey_code');
if (!SESSION_ID) location.href = '/';

let confidenceRating = null;
let mentalEffort     = null;

// ── Build Likert scales ────────────────────────────────────────────────────────
function buildLikert(containerId, setter) {
  const container = document.getElementById(containerId);
  for (let i = 1; i <= 7; i++) {
    const opt = document.createElement('div');
    opt.className = 'likert-opt';
    opt.dataset.val = i;
    opt.innerHTML = `<div class="likert-btn">${i}</div>`;
    opt.addEventListener('click', () => {
      container.querySelectorAll('.likert-opt').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      setter(i);
    });
    container.appendChild(opt);
  }
}

buildLikert('confidence-group', v => confidenceRating = v);
buildLikert('effort-group',     v => mentalEffort = v);

// ── Load summary ──────────────────────────────────────────────────────────────
async function loadSummary() {
  try {
    const res = await fetch(`/api/sessions/${SESSION_ID}/summary`);
    if (!res.ok) return;
    const data = await res.json();
    document.getElementById('stat-accuracy').textContent = data.accuracy_pct + '%';
    document.getElementById('stat-correct').textContent  = `${data.correct}/${data.total_tasks}`;
    const avg = data.avg_duration_ms;
    document.getElementById('stat-avg-time').textContent = avg
      ? (avg / 1000).toFixed(1) + 's' : '—';
  } catch (e) { /* non-critical */ }
}

// ── Submit ────────────────────────────────────────────────────────────────────
async function submitFeedback() {
  const btn = document.getElementById('submit-fb-btn');
  btn.disabled    = true;
  btn.textContent = 'Submitting…';

  const body = {
    session_id:        SESSION_ID,
    confidence_rating: confidenceRating,
    mental_effort:     mentalEffort,
  };

  try {
    const res = await fetch('/api/sessions/feedback', {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify(body),
    });
    if (!res.ok) throw new Error('Server error');

    document.getElementById('feedback-form').style.display = 'none';
    document.getElementById('final-code-display').textContent = SESSION_ID;
    document.getElementById('done-state').style.display = 'block';
    sessionStorage.clear();
  } catch (e) {
    btn.disabled    = false;
    btn.textContent = 'Submit Feedback & Get Final Code';
    alert('Error: ' + e.message);
  }
}

function copyFinal() {
  navigator.clipboard.writeText(SESSION_ID).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = 'Copy code', 2000);
  });
}

loadSummary();
</script>
</body>
</html>
